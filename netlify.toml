# Netlify config — English Land — Adventure Quest
# Sitio estático: no necesita build step.

[build]
  publish = "."
  command = ""

# Excluir carpetas de trabajo del deploy
[build.processing]
  skip_processing = false

# === Headers globales de seguridad ===
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Content-Security-Policy  = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; connect-src 'self'; upgrade-insecure-requests"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), clipboard-read=(), clipboard-write=()"

# === Cache largo para assets estáticos ===
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fondos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# === HTML siempre fresco ===
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_dev/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, nosnippet"
    Cache-Control = "no-store"

[[redirects]]
  from   = "/_dev/*"
  to     = "/index.html"
  status = 404

# === Fallback SPA-style: cualquier ruta desconocida sirve index ===
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

